apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-manual
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather
  template:
    metadata:
      labels:
        app: weather
        # 통합 서비스 태깅
        tags.datadoghq.com/env: "prod"
        tags.datadoghq.com/service: "weather-app"
        tags.datadoghq.com/version: "1.0.0"
    spec:
      containers:
      - name: weather
        image: weather:latest
        # 실행 명령어를 ddtrace-run으로 감싸야 함
        command: ["ddtrace-run"]
        args: ["python", "app.py"]
        ports:
        - containerPort: 8000
        env:
          # 1. 에이전트 호스트 IP 주입 (필수)
          - name: DD_AGENT_HOST
            valueFrom:
              fieldRef:
                fieldPath: status.hostIP
          # 2. 서비스 식별 정보 (수동 연결)
          - name: DD_ENV
            valueFrom:
              fieldRef:
                fieldPath: metadata.labels['tags.datadoghq.com/env']
          - name: DD_SERVICE
            valueFrom:
              fieldRef:
                fieldPath: metadata.labels['tags.datadoghq.com/service']
          - name: DD_VERSION
            valueFrom:
              fieldRef:
                fieldPath: metadata.labels['tags.datadoghq.com/version']
          # 3. APM 활성화
          - name: DD_TRACE_ENABLED
            value: "true"
          - name: OPENWEATHER_API_KEY
            value: "your_api_key"