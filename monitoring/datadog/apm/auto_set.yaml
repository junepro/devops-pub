apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-auto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather
  template:
    metadata:
      labels:
        app: weather
        tags.datadoghq.com/env: "prod"
        tags.datadoghq.com/service: "weather-app"
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        # 핵심: Python 라이브러리 및 환경 변수 자동 주입 지시
        admission.datadoghq.com/python-lib.version: "latest"
    spec:
      containers:
      - name: weather
        image: weather:latest # 일반 이미지 그대로 사용
        ports:
        - containerPort: 8000
        env:
          - name: OPENWEATHER_API_KEY
            value: "your_api_key"