apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rollout-test-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/junepro/devops-pub
    targetRevision: HEAD
    # 기존 'plugins/rollouts' 대신 아래 경로로 수정
    path: argocd/rollout/sample
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true