name: retail-sample
networks:
  default:
    name: retail-sample_default
services:
  cart:
    cap_add:             # "특권 포트 바인딩" 권한만 다시 허용 
      - NET_BIND_SERVICE # 리눅스에서 **1024번 미만의 포트(예: HTTP 80, HTTPS 443)**를 사용하려면 반드시 이 권한이 필요합니다.
                         # cart 서비스가 외부 통신을 위해 낮은 번호의 포트를 열어야 할 때 사용됩니다
    cap_drop:
      - all
    depends_on:
      carts-db:
        condition: service_healthy
        required: true
    environment:
      - SERVER_TOMCAT_ACCESSLOG_ENABLED=true
      - RETAIL_CART_PERSISTENCE_PROVIDER=dynamodb
      - RETAIL_CART_PERSISTENCE_DYNAMODB_ENDPOINT=http://carts-db:8000
      - RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE=true
      - AWS_ACCESS_KEY_ID=key
      - AWS_SECRET_ACCESS_KEY=dummy
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 15s
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/actuator/health || exit 1
      timeout: 10s
    hostname: carts
    networks:
      default: null
    ports: []
    read_only: true
    restart: always
    security_opt:                 # 컨테이너 안의 일반 사용자가 취약점을 이용해 root 권한을 획득하려는 시도를 커널 수준에서 차단
      - no-new-privileges:true    # 컨테이너 내부의 프로세스가 setuid나 setgid 바이너리를 실행하여 자신의 권한을 상승시키는 것을 방지
    tmpfs:          
      - /tmp:rw,noexec,nosuid
    image: public.ecr.aws/aws-containers/retail-store-sample-cart:1.3.0
  carts-db:
    cap_add:
      - CHOWN # 파일의 소유자/그룹을 변경할 수 있는 권한
      - SETGID # 프로세스의 그룹 ID나 사용자 ID를 변경할 수 있게 하여, 특정 권한으로 파일을 실행하거나 접근
      - SETUID
    cap_drop: # 위에서 명시한 cap_add 항목을 제외한 모든 리눅스 커널 권한을 제거
      - all
    healthcheck:
      interval: 5s
      retries: 3
      test:
        - CMD-SHELL
        - exit 0
      timeout: 15s
    hostname: carts-db
    image: amazon/dynamodb-local:1.20.0
    networks:
      default: null
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid
  catalog:
    cap_drop:
      - all
    depends_on:
      catalog-db:
        condition: service_healthy
        required: true
        restart: true
    environment:
      - GIN_MODE=release
      - reschedule=on-node-failure
      - RETAIL_CATALOG_PERSISTENCE_PROVIDER=mysql
      - RETAIL_CATALOG_PERSISTENCE_PASSWORD=${DB_PASSWORD}
      - RETAIL_CATALOG_PERSISTENCE_ENDPOINT=catalog-db:3306
    healthcheck:
      interval: 10s
      retries: 3
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/health || exit 1
      timeout: 10s
    hostname: catalog
    networks:
      default: null
    ports: []
    restart: always
    security_opt:
      - no-new-privileges:true
    image: public.ecr.aws/aws-containers/retail-store-sample-catalog:1.3.0
  catalog-db:
    environment:
      - reschedule=on-node-failure
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_ALLOW_EMPTY_PASSWORD=true
      - MYSQL_DATABASE=catalogdb
      - MYSQL_USER=catalog_user
      - MYSQL_PASSWORD=${DB_PASSWORD}
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 30s
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - catalog_user
        - -p${DB_PASSWORD}
      timeout: 5s
    hostname: catalog-db
    image: mariadb:10.9
    networks:
      default: null
    restart: always
    security_opt:
      - no-new-privileges:true
  checkout:
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - all
    depends_on:
      checkout-redis:
        condition: service_healthy
        required: true
    environment:
      - RETAIL_CHECKOUT_PERSISTENCE_PROVIDER=redis
      - RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL=redis://checkout-redis:6379
      - RETAIL_CHECKOUT_ENDPOINTS_ORDERS=http://orders:8080
    healthcheck:
      interval: 10s
      retries: 3
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/health || exit 1
      timeout: 10s
    hostname: checkout
    networks:
      default: null
    ports: []
    read_only: true
    restart: always
    tmpfs:
      - /tmp:rw,noexec,nosuid
    image: public.ecr.aws/aws-containers/retail-store-sample-checkout:1.3.0
  checkout-redis:
    healthcheck:
      interval: 1s
      retries: 30
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 3s
    hostname: checkout-redis
    image: redis:6.0-alpine
    networks:
      default: null
    ports: []
    restart: always
  orders:
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - all
    depends_on:
      orders-db:
        condition: service_healthy
        required: true
        restart: true
    environment:
      - reschedule=on-node-failure
      - SERVER_TOMCAT_ACCESSLOG_ENABLED=true
      - RETAIL_ORDERS_PERSISTENCE_PROVIDER=postgres
      - RETAIL_ORDERS_PERSISTENCE_ENDPOINT=orders-db:5432
      - RETAIL_ORDERS_PERSISTENCE_NAME=orders
      - RETAIL_ORDERS_PERSISTENCE_USERNAME=orders_user
      - RETAIL_ORDERS_PERSISTENCE_PASSWORD=${DB_PASSWORD}
      - RETAIL_ORDERS_MESSAGING_PROVIDER=rabbitmq
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_ADDRESSES=rabbitmq:5672
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_USERNAME=rabbitmq
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_PASSWORD=${DB_PASSWORD}
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 15s
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/actuator/health || exit 1
      timeout: 10s
    hostname: orders
    networks:
      default: null
    ports: []
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid
    image: public.ecr.aws/aws-containers/retail-store-sample-orders:1.3.0
  orders-db:
    environment:
      - reschedule=on-node-failure
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=orders
      - POSTGRES_USER=orders_user
    healthcheck:
      interval: 10s
      retries: 30
      test:
        - CMD-SHELL
        - pg_isready -d orders -U orders_user
      timeout: 5s
    hostname: orders-db
    image: postgres:16.1
    networks:
      default: null
    ports: []
    restart: always
    security_opt:
      - no-new-privileges:true
  rabbitmq:
    environment:
      - RABBITMQ_DEFAULT_USER=rabbitmq
      - RABBITMQ_DEFAULT_PASS=${DB_PASSWORD}
    hostname: rabbitmq
    image: rabbitmq:3-management
    networks:
      default: null
    ports: []
    restart: always
    security_opt:
      - no-new-privileges:true
  ui:
    cap_drop:
      - ALL
    depends_on:
      cart:
        condition: service_healthy
        required: true
        restart: true
      catalog:
        condition: service_healthy
        required: true
        restart: true
      checkout:
        condition: service_healthy
        required: true
        restart: true
      orders:
        condition: service_healthy
        required: true
        restart: true
    environment:
      - JAVA_OPTS=-XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom
      - SERVER_TOMCAT_ACCESSLOG_ENABLED=true
      - RETAIL_UI_ENDPOINTS_CATALOG=http://catalog:8080
      - RETAIL_UI_ENDPOINTS_CARTS=http://carts:8080
      - RETAIL_UI_ENDPOINTS_ORDERS=http://orders:8080
      - RETAIL_UI_ENDPOINTS_CHECKOUT=http://checkout:8080
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 15s
      test:
        - CMD-SHELL
        - curl -s -f http://localhost:8080/actuator/health || exit 1
      timeout: 10s
    hostname: ui
    mem_limit: 512m
    networks:
      default: null
    ports:
      - mode: ingress
        protocol: tcp
        published: "8888"
        target: 8080
    restart: always
    image: public.ecr.aws/aws-containers/retail-store-sample-ui:1.3.0
