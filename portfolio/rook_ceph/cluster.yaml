apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  cephVersion:
    image: quay.io/ceph/ceph:v19

  dataDirHostPath: /var/lib/rook

  mon:
    count: 2
    allowMultiplePerNode: false
    volumeClaimTemplate:
      spec:
        storageClassName: ebs-gp3-rook
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  mgr:
    count: 1

  dashboard:
    enabled: true

  network:
    provider: host

  storage:
    storageClassDeviceSets:
      - name: set1
        count: 2
        portable: false
        tuneDeviceClass: true
        encrypted: false
        volumeClaimTemplates:
          - metadata:
              name: data
            spec:
              storageClassName: ebs-gp3-rook
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi
              volumeMode: Block