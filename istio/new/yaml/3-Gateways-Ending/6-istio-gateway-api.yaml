# 1. Gateway 정의
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: fleetman-gateway
  namespace: default
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same

---
# 2. Original 버전용 Service
apiVersion: v1
kind: Service
metadata:
  name: fleetman-webapp-original
  namespace: default
spec:
  selector:
    app: webapp
    version: original
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP

---
# 3. Experimental 버전용 Service
apiVersion: v1
kind: Service
metadata:
  name: fleetman-webapp-experimental
  namespace: default
spec:
  selector:
    app: webapp
    version: experimental
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP

---
# 4. HTTPRoute - 90:10 Canary 트래픽 분배
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fleetman-webapp-canary
  namespace: default
spec:
  parentRefs:
    - name: fleetman-gateway
  hostnames:
    - "*"
  rules:
    - backendRefs:
        - name: fleetman-webapp-original
          port: 80
          weight: 90  # 90% 트래픽
        - name: fleetman-webapp-experimental
          port: 80
          weight: 10  # 10% 트래픽