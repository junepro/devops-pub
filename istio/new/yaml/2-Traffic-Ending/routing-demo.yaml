apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: ingress-gateway-configuration
  namespace: default
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: fleetman-webapp
  namespace: default
spec:
  hosts:
    - "*"
  gateways:
    - ingress-gateway-configuration
  http:
  - match:
    - uri:
        prefix: "/experimental"
    - uri:
        prefix: "/canary"
    route:
    - destination:
        host: fleetman-webapp
        subset: experimental
  - match:
    - uri:
        prefix: "/"
    route:
    - destination:
        host: fleetman-webapp
        subset: original
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: fleetman-webapp
  namespace: default
spec:
  host: fleetman-webapp
  subsets:
    - name: original
      labels:
        version: original
    - name: experimental
      labels:
        version: experimental
---
kind: DestinationRule
apiVersion: networking.istio.io/v1beta1
metadata:
  name: fleetman-webapp
  namespace: default
spec:
  host: fleetman-webapp
  subsets:
    - labels:
        version: original
      name: original
    - labels:
        version: experimental
      name: experimental


--- ## 게이트웨이 변환

# 1. 인프라의 입구 정의 (Gateway)
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: fleetman-gateway
  namespace: default
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: Same
---
# 2. 경로 기반 라우팅 규칙 정의 (HTTPRoute)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fleetman-webapp-route
  namespace: default
spec:
  parentRefs:
  - name: fleetman-gateway
  hostnames:
  - "*"
  rules:
  - matches: # /experimental 또는 /canary 일 때
    - path:
        type: PathPrefix
        value: "/experimental"
    - path:
        type: PathPrefix
        value: "/canary"
    backendRefs:
    - name: fleetman-webapp
      port: 80
      filters:
      - type: ExtensionRef
        extensionRef:
          group: networking.istio.io
          kind: DestinationRule
          name: fleetman-webapp
  - matches: # 그 외 모든 경로 (/)
    - path:
        type: PathPrefix
        value: "/"
    backendRefs:
    - name: fleetman-webapp
      port: 80
      filters:
      - type: ExtensionRef
        extensionRef:
          group: networking.istio.io
          kind: DestinationRule
          name: fleetman-webapp
---
# 3. 버전 그룹화 (DestinationRule) - 위와 동일
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: fleetman-webapp
  namespace: default
spec:
  host: fleetman-webapp
  subsets:
    - name: original
      labels:
        version: original
    - name: experimental
      labels:
        version: experimental
