# 1. Gateway (변경 없음 - 완벽합니다)
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: fleetman-gateway
  namespace: istio-system
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
---
# 2. HTTPRoute (중요 수정: backendRefs에 subset 연결)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fleetman-webapp-route
  namespace: default
spec:
  parentRefs:
    - name: fleetman-gateway
      namespace: istio-system
  hostnames:
    - "*"
  rules:
    # [Rule 1] /experimental 또는 /canary로 시작하면 experimental 버전으로!
    - matches:
        - path: { type: PathPrefix, value: "/experimental" }
        - path: { type: PathPrefix, value: "/canary" }
      backendRefs:
        - name: fleetman-webapp
          port: 80
          # Istio 특화 설정: DestinationRule의 subset 이름을 지정합니다.
          filters:
            - type: ExtensionRef
              extensionRef:
                group: networking.istio.io
                kind: DestinationRule
                name: fleetman-webapp/experimental 
    # [Rule 2] 그 외 모든 요청(Default)은 original 버전으로!
    - backendRefs:
        - name: fleetman-webapp
          port: 80
          filters:
            - type: ExtensionRef
              extensionRef:
                group: networking.istio.io
                kind: DestinationRule
                name: fleetman-webapp/original
---
# 3. DestinationRule (v1beta1 대신 최신 v1 사용)
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: fleetman-webapp
  namespace: default
spec:
  host: fleetman-webapp # 혹은 전체 FQDN
  subsets:
    - name: original
      labels:
        version: original
    - name: experimental
      labels:
        version: experimental